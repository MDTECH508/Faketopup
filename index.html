<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Tech Premium - Topup FF Auto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff003c;
            --glass: rgba(255, 255, 255, 0.05);
            --border: 1px solid rgba(255, 255, 255, 0.12);
            --neon: 0 0 20px rgba(255, 0, 60, 0.4);
        }

        body, html {
            margin: 0; padding: 0; background: #050505;
            color: #fff; font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        .bg-vibe {
            position: fixed; inset: 0;
            background: url('https://i.pinimg.com/originals/eb/3a/7b/eb3a7b6d1947e44a49186675003666f2.jpg') center/cover;
            filter: brightness(0.2) blur(10px); z-index: -1;
        }

        .screen { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 10000; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(20px); }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: var(--border); border-radius: 25px; padding: 25px; width: 85%; max-width: 380px; text-align: center; }
        
        .auth-input { width: 100%; padding: 15px; margin-top: 12px; border-radius: 12px; border: var(--border); background: rgba(0,0,0,0.6); color: #fff; outline: none; box-sizing: border-box; }
        
        .btn-glow { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(45deg, var(--primary-red), #990024); color: #fff; font-weight: bold; cursor: pointer; box-shadow: var(--neon); margin-top: 15px; }

        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); border-bottom: var(--border); position: sticky; top: 0; z-index: 100; }
        .page { display: none; padding: 20px; padding-bottom: 120px; }
        .active { display: block; }

        .stat-box { background: var(--glass); padding: 15px; border-radius: 15px; border: var(--border); margin-bottom: 10px; cursor: pointer; }
        
        /* CODE BOX STYLE */
        #code-display-area {
            background: rgba(0,0,0,0.8);
            border: 2px dashed var(--primary-red);
            padding: 15px;
            margin-top: 15px;
            border-radius: 15px;
            display: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 5px rgba(255,0,60,0.2); }
            50% { box-shadow: 0 0 20px rgba(255,0,60,0.5); }
            100% { box-shadow: 0 0 5px rgba(255,0,60,0.2); }
        }

        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(10,10,10,0.9); border-radius: 30px; display: flex; justify-content: space-around; padding: 15px; border: var(--border); }
        .nav-link { color: #444; font-size: 22px; cursor: pointer; }
        .nav-link.active { color: var(--primary-red); }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 20000; backdrop-filter: blur(15px); }
    </style>
</head>
<body>

    <div class="bg-vibe"></div>

    <div id="modal-overlay">
        <div class="glass-card">
            <h2 id="modal-title" style="color:var(--primary-red); margin:0;">FREE FIRE TOPUP</h2>
            <div id="modal-body">
                </div>
            <button class="btn-glow" style="background:#222; box-shadow:none; margin-top:20px;" onclick="closeModal()">ANILE</button>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="glass-card">
            <h2>BIENVENUE</h2>
            <input type="text" id="reg-name" class="auth-input" placeholder="Non konplè">
            <input type="number" id="reg-phone" class="auth-input" placeholder="WhatsApp (509...)">
            <input type="password" id="reg-pin" class="auth-input" placeholder="PIN 4 chif">
            <button class="btn-glow" onclick="handleAuth()">KOMANSE</button>
            <p style="font-size:10px; margin-top:15px; color:var(--primary-red); cursor:pointer" onclick="checkAdmin()">Admin Panel (1234)</p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div style="font-weight:900;">FAKE <span style="color:var(--primary-red)">TECH</span></div>
            <div id="u-tag" style="font-size:10px; padding:5px 12px; background:rgba(255,0,60,0.1); border-radius:20px; border:1px solid var(--primary-red);">ID: --</div>
        </header>

        <div id="home" class="page active">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div class="stat-box" style="text-align:center" onclick="openFF()"><i class="fa-solid fa-gem" style="color:var(--primary-red)"></i><br>Free Fire</div>
                <div class="stat-box" style="text-align:center" onclick="buyNetflix()"><i class="fa-solid fa-tv"></i><br>Netflix</div>
                <div class="stat-box" style="text-align:center" onclick="buyTikTok()"><i class="fa-brands fa-tiktok"></i><br>TikTok</div>
                <div class="stat-box" style="text-align:center" onclick="alert('Bientôt disponible')"><i class="fa-solid fa-cube"></i><br>Roblox</div>
            </div>
        </div>

        <div id="wallet" class="page">
            <div class="glass-card" style="width:100%; box-sizing:border-box;">
                <small>BALANCE AUTOMATIQUE</small>
                <h1 id="user-bal">0.00 HTG</h1>
                <hr style="opacity:0.1; margin:20px 0;">
                <input type="number" id="t-code" class="auth-input" placeholder="Transcode (12-15 chif)">
                <input type="number" id="t-amt" class="auth-input" placeholder="Kantite HTG">
                <button class="btn-glow" id="btn-recharge" onclick="processAutoRecharge()">RECHARGE</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-link active" onclick="showPage('home', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-link" onclick="showPage('wallet', this)"><i class="fa-solid fa-wallet"></i></div>
        </nav>
    </div>

    <script>
        let sessionUser = JSON.parse(localStorage.getItem('active_user')) || null;
        let usedCodes = JSON.parse(localStorage.getItem('used_codes')) || [];

        function handleAuth() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const pin = document.getElementById('reg-pin').value;
            if(name && phone && pin.length === 4) {
                sessionUser = { name, phone, balance: 0, id: "FT-"+Math.floor(1000+Math.random()*9000) };
                localStorage.setItem('active_user', JSON.stringify(sessionUser));
                renderApp();
            } else { alert("Remplir tout fòm yo!"); }
        }

        function renderApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-tag').innerText = "ID: " + sessionUser.id;
            updateUI();
        }

        function updateUI() {
            document.getElementById('user-bal').innerText = sessionUser.balance.toFixed(2) + " HTG";
        }

        // AUTO RECHARGE
        function processAutoRecharge() {
            const code = document.getElementById('t-code').value;
            const amt = parseFloat(document.getElementById('t-amt').value);
            if(code.length >= 12 && !usedCodes.includes(code) && amt > 0) {
                document.getElementById('btn-recharge').innerText = "VERIFICATION...";
                setTimeout(() => {
                    sessionUser.balance += amt;
                    usedCodes.push(code);
                    localStorage.setItem('active_user', JSON.stringify(sessionUser));
                    localStorage.setItem('used_codes', JSON.stringify(usedCodes));
                    updateUI();
                    document.getElementById('btn-recharge').innerText = "RECHARGE";
                    alert("✅ Balans ou ajoute otomatikman!");
                }, 2000);
            } else { alert("Kòd erone oswa itilize deja!"); }
        }

        // FREE FIRE LOGIC
        function openFF() {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('modal-body').innerHTML = `
                <input type="number" id="ff-id" class="auth-input" placeholder="Antre ID Player">
                <button class="btn-glow" style="background:#00ccff; padding:10px; font-size:12px;" onclick="verifyGarena()">VERIFYE SOU GARENA</button>
                <div id="ff-name" style="margin:10px; color:#00ffcc; font-weight:bold; font-size:14px;"></div>
                
                <div id="ff-packages" style="display:none; margin-top:15px;">
                    <div class="stat-box" onclick="generateFFCode(100, 165)">100 💎 - 165 HTG</div>
                    <div class="stat-box" onclick="generateFFCode(310, 450)">310 💎 - 450 HTG</div>
                </div>

                <div id="code-display-area">
                    <small style="color:var(--primary-red)">KÒD TOPUP OU:</small>
                    <h2 id="final-code" style="letter-spacing:2px; margin:10px 0;">--------</h2>
                    <button class="btn-glow" style="background:green; margin-top:5px;" onclick="copyCode()">KOPYE KÒD</button>
                    <button class="btn-glow" style="background:#ff9900;" onclick="goToRedeem()">REDEEM KOUNYE A</button>
                </div>
            `;
        }

        function verifyGarena() {
            const id = document.getElementById('ff-id').value;
            if(id.length > 5) {
                document.getElementById('ff-name').innerText = "✅ Player Found: " + sessionUser.name.toUpperCase();
                document.getElementById('ff-packages').style.display = 'block';
            } else { alert("ID sa pa bon!"); }
        }

        function generateFFCode(dm, price) {
            if(sessionUser.balance < price) {
                alert("❌ Ou pa gen ase kòb sou balans ou. Recharge anvan!");
                return;
            }
            // Dedwi kòb la otomatikman
            sessionUser.balance -= price;
            localStorage.setItem('active_user', JSON.stringify(sessionUser));
            updateUI();

            const randomCode = "GIFT-" + Math.random().toString(36).substr(2, 10).toUpperCase();
            document.getElementById('ff-packages').style.display = 'none';
            document.getElementById('code-display-area').style.display = 'block';
            document.getElementById('final-code').innerText = randomCode;
        }

        function copyCode() {
            const code = document.getElementById('final-code').innerText;
            navigator.clipboard.writeText(code);
            alert("Kòd kopye! Al kole l sou redeempins.com");
        }

        function goToRedeem() {
            window.location.href = "https://redeempins.com";
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        window.onload = () => { if(sessionUser) renderApp(); };
    </script>
</body>
</html>
