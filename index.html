    <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Topup Premium - Luxury Glass</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff003c;
            --glass: rgba(255, 255, 255, 0.03);
            --deep-glass: rgba(0, 0, 0, 0.85);
            --border: 1px solid rgba(255, 255, 255, 0.12);
            --neon-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            background: #050505;
            color: #fff; font-family: 'Poppins', sans-serif;
            min-height: 100vh; overflow-x: hidden;
        }

        .bg-vibe {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.pinimg.com/originals/eb/3a/7b/eb3a7b6d1947e44a49186675003666f2.jpg') center/cover;
            filter: brightness(0.3) blur(2px); z-index: -2;
        }

        /* MODAL */
        #game-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px); z-index: 20000;
            display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--glass); border: var(--border);
            padding: 25px; border-radius: 30px; width: 85%; max-width: 400px;
            text-align: center; backdrop-filter: blur(20px);
        }

        /* LOGIN STYLE */
        #auth-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .glass-box { background: var(--glass); border: var(--border); padding: 35px; border-radius: 35px; width: 85%; max-width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; margin-top: 12px; border-radius: 12px; border: var(--border); background: rgba(0,0,0,0.6); color: #fff; outline: none; box-sizing: border-box; }
        .btn-glow { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(45deg, var(--primary-red), #b3002a); color: #fff; font-weight: 700; margin-top: 15px; cursor: pointer; box-shadow: var(--neon-shadow); }

        /* DASHBOARD */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--deep-glass); backdrop-filter: blur(10px); border-bottom: var(--border); position: sticky; top: 0; z-index: 100; }
        .slider-wrap { width: 92%; height: 160px; margin: 15px auto; border-radius: 20px; overflow: hidden; border: var(--border); }
        .slides { display: flex; width: 500%; height: 100%; transition: 0.8s ease-in-out; }
        .slide { width: 100%; height: 100%; background-size: cover; background-position: center; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card-item { background: var(--glass); border: var(--border); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; }
        .page { display: none; padding-bottom: 120px; }
        .page.active { display: block; }

        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(10,10,10,0.85); backdrop-filter: blur(20px); border-radius: 30px; display: flex; justify-content: space-around; padding: 15px 0; border: var(--border); }
        .nav-item { color: rgba(255,255,255,0.3); font-size: 20px; cursor: pointer; }
        .nav-item.active { color: var(--primary-red); }
    </style>
</head>
<body>

    <div class="bg-vibe"></div>

    <div id="game-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="color:var(--primary-red); margin:0;"></h2>
            <div id="modal-body" style="margin-top:20px;"></div>
            <button class="btn-glow" style="background:#222; box-shadow:none;" onclick="closeModal()">FÈMEN</button>
        </div>
    </div>

    <div id="auth-screen">
        <div class="glass-box">
            <h1 id="auth-title">KONEKTE</h1>
            <input type="text" id="user-input" class="auth-input" placeholder="Non konplè">
            <input type="password" id="pass-input" class="auth-input" placeholder="PIN (4 chif)">
            <button class="btn-glow" onclick="initSession()">KONEKTE KOUNYE A</button>
            <p id="toggle-auth" style="font-size:12px; margin-top:15px; cursor:pointer; opacity:0.7;" onclick="toggleAuth()">Pa gen kont? <b>Kreye yonn</b></p>
        </div>
    </div>

    <div id="app-content" style="display:none">
        <header>
            <div style="font-weight:900;">F-T <span style="color:var(--primary-red)">PREMIUM</span></div>
            <div id="client-id" style="font-size:10px; padding:6px 15px; background:rgba(255,0,60,0.15); border-radius:20px; border: 1px solid var(--primary-red);">ID: 0000</div>
        </header>

        <div id="home" class="page active">
            <div class="slider-wrap">
                <div class="slides" id="main-slider">
                    <div class="slide" style="background-image: url('https://wallpapers.com/images/featured/free-fire-j56as76e6p44p80n.jpg');"></div>
                    <div class="slide" style="background-image: url('https://images.wallpapersden.com/wallpaper/d/lamborghini-huracan-gt3-evo_65874.jpg');"></div>
                    <div class="slide" style="background-image: url('https://i.pinimg.com/originals/6a/82/3e/6a823e8006e88536f903080e70415394.jpg');"></div>
                </div>
            </div>

            <div class="grid-container">
                <div class="card-item" onclick="openFF()"><i class="fa-solid fa-gem" style="color:var(--primary-red)"></i><br>Free Fire</div>
                <div class="card-item" onclick="openNetflix()"><i class="fa-solid fa-tv"></i><br>Netflix</div>
                <div class="card-item" onclick="openApple()"><i class="fa-brands fa-apple"></i><br>Apple Gift</div>
                <div class="card-item" onclick="alert('Bientôt disponible')"><i class="fa-solid fa-cube"></i><br>Roblox</div>
            </div>
        </div>

        <div id="recharge" class="page">
            <div class="card-item" style="margin:20px; background:rgba(255,0,60,0.1);">
                <small>BALANCE</small>
                <h1 id="balance-display">0.00 HTG</h1>
            </div>
            <div style="padding:20px;">
                <h3>NATCASH DEPÔT</h3>
                <p style="font-size:13px;">Agent: <b>5511-2990</b> (Enelson P.)</p>
                <input type="number" id="trans-input" class="auth-input" placeholder="Antre Transcode (12-15 chif)">
                <button class="btn-glow" onclick="verifyTranscode()">VERIFYE PAIEMENT</button>
            </div>
        </div>

        <div id="profile" class="page">
            <div class="glass-box" style="margin: 20px auto; width: 90%;">
                <h2 id="display-user">Kliyan</h2>
                <p><i class="fa-brands fa-whatsapp"></i> +509 3494-6793</p>
                <button class="btn-glow" onclick="logout()" style="background:#222;">DEKONEKTE</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showPage('home', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="showPage('recharge', this)"><i class="fa-solid fa-wallet"></i></div>
            <div class="nav-item" onclick="showPage('profile', this)"><i class="fa-solid fa-headset"></i></div>
        </nav>
    </div>

    <script>
        let isLogin = true;

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "KONEKTE" : "KREYE KONT";
            document.getElementById('toggle-auth').innerHTML = isLogin ? "Pa gen kont? <b>Kreye yonn</b>" : "Ou gen kont deja? <b>Konekte</b>";
        }

        function initSession() {
            const user = document.getElementById('user-input').value;
            const pin = document.getElementById('pass-input').value;
            if(user && pin.length === 4) {
                localStorage.setItem('user_name', user);
                localStorage.setItem('user_id', "FT-" + Math.floor(1000 + Math.random()*9000));
                location.reload();
            } else { alert("Remplir tout champ yo (PIN dwe 4 chif)"); }
        }

        // FREE FIRE MODAL
        function openFF() {
            document.getElementById('modal-title').innerText = "FREE FIRE TOPUP";
            document.getElementById('modal-body').innerHTML = `
                <input type="number" id="ff-id" class="auth-input" placeholder="Antre ID Free Fire">
                <button class="btn-glow" style="padding:8px; font-size:12px;" onclick="verifyFF()">VERIFYE ID</button>
                <div id="ff-name" style="margin:10px; color:#00ffcc; font-weight:bold;"></div>
                <div class="card-item" style="margin-top:10px; font-size:13px;">100 Diamonds - 165 HTG</div>
                <div class="card-item" style="margin-top:5px; font-size:13px;">310 Diamonds - 450 HTG</div>
                <button class="btn-glow" onclick="alert('Chwazi diamonds epi klike verifye ID')">ACHTE KOUNYE A</button>
            `;
            document.getElementById('game-modal').style.display = 'flex';
        }

        function verifyFF() {
            const id = document.getElementById('ff-id').value;
            if(id.length > 5) {
                document.getElementById('ff-name').innerText = "✅ Player: " + localStorage.getItem('user_name').toUpperCase();
            } else { alert("ID sa pa bon"); }
        }

        // NETFLIX WHATSAPP
        function openNetflix() {
            const name = localStorage.getItem('user_name');
            const id = localStorage.getItem('user_id');
            const msg = `Bonjour Support, je souhaite faire un abonnement Netflix mensuel.\n\nNom Client: ${name}\nID Client: ${id}\nOffre: 1 Mois Premium (500 HTG)`;
            const url = `https://wa.me/50934946793?text=${encodeURIComponent(msg)}`;
            window.location.href = url;
        }

        // APPLE GIFT
        function openApple() {
            document.getElementById('modal-title').innerText = "APPLE GIFT CARD";
            document.getElementById('modal-body').innerHTML = `
                <div class="card-item" style="margin-bottom:10px;">$2 Card - 350 GDS</div>
                <div class="card-item" style="margin-bottom:10px;">$5 Card - 850 GDS</div>
                <div class="card-item" style="margin-bottom:10px;">$10 Card - 1600 GDS</div>
                <button class="btn-glow" onclick="alert('Kontakte support pou stock disponib')">ACHTE SOU WHATSAPP</button>
            `;
            document.getElementById('game-modal').style.display = 'flex';
        }

        function verifyTranscode() {
            const val = document.getElementById('trans-input').value;
            if(val.length >= 12 && val.length <= 15) {
                alert("✅ Transcode voye ak siksè! Admin ap valide sa nan 5 minit.");
            } else {
                alert("❌ Erreur: Transcode dwe gen ant 12 a 15 chif.");
            }
        }

        function closeModal() { document.getElementById('game-modal').style.display = 'none'; }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            const u = localStorage.getItem('user_name');
            if(u) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                document.getElementById('display-user').innerText = u;
                document.getElementById('client-id').innerText = "ID: " + localStorage.getItem('user_id');
            }
        };

        let cur = 0;
        setInterval(() => {
            cur++; if(cur > 2) cur = 0;
            const slider = document.getElementById('main-slider');
            if(slider) slider.style.transform = `translateX(-${cur * 100}%)`;
        }, 1000);
    </script>
</body>
</html>
