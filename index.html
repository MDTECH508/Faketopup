 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake YT Tech | V14 Cyber-Glass</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff003c;
            --neon-blue: #00d4ff;
            --bg-dark: #020408;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --cyber-gradient: linear-gradient(90deg, var(--neon-pink), var(--neon-blue));
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg-dark);
            color: #fff; font-family: 'Orbitron', sans-serif;
            overflow-x: hidden; min-height: 100vh;
        }

        /* --- EFÈ GLASS & BLUR --- */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        /* --- AUTH PAGE --- */
        .auth-overlay {
            position: fixed; inset: 0; z-index: 10000;
            background: url('https://wallpapercave.com/wp/wp4900892.jpg') center/cover;
            display: flex; justify-content: center; align-items: center;
        }
        .auth-card {
            width: 85%; max-width: 400px; padding: 30px; text-align: center;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        /* --- PUB BANNER --- */
        .promo-banner {
            margin: 15px; padding: 20px; border-radius: 20px;
            background: linear-gradient(45deg, rgba(255,0,60,0.2), rgba(0,212,255,0.2));
            border: 2px solid var(--neon-pink);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 
            0% { box-shadow: 0 0 5px var(--neon-pink); }
            50% { box-shadow: 0 0 20px var(--neon-pink); }
            100% { box-shadow: 0 0 5px var(--neon-pink); }
        }

        /* --- GRID SYSTEM --- */
        .category-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 15px; }
        .service-card {
            position: relative; height: 120px; border-radius: 20px;
            overflow: hidden; cursor: pointer; border: 1px solid var(--glass-border);
        }
        .service-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; }
        .service-card:hover img { opacity: 0.8; transform: scale(1.1); }
        .service-card .label { position: absolute; bottom: 15px; left: 15px; font-weight: bold; font-size: 18px; text-shadow: 0 2px 5px #000; }

        /* --- INPUTS & BUTTONS --- */
        input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--neon-blue);
            color: #fff; box-sizing: border-box; outline: none;
        }
        .cyber-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--cyber-gradient); color: #fff; font-weight: 900;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        }

        /* --- MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 5000; display: none; flex-direction: column; padding: 20px;
        }

        /* --- NAV --- */
        nav {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 70px; display: flex; justify-content: space-around;
            align-items: center; z-index: 1000;
        }
        .nav-item { color: #555; font-size: 22px; transition: 0.3s; }
        .nav-item.active { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        .page { display: none; padding-bottom: 100px; animation: fadeIn 0.5s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card glass">
            <h1 style="color:var(--neon-blue); letter-spacing:5px;">FAKE YT</h1>
            <p id="auth-title" style="font-size:12px; opacity:0.6;">KREYE YON KONT</p>
            
            <input type="email" id="auth-email" placeholder="Email (Gmail)">
            <input type="password" id="auth-pass" placeholder="Modpas">
            
            <button class="cyber-btn" id="main-auth-btn" onclick="processAuth()">KREYE KONT</button>
            
            <p style="font-size:11px; margin-top:20px;">
                <span id="auth-switch-text">Ou gen kont deja?</span> 
                <b style="color:var(--neon-pink); cursor:pointer;" id="auth-toggle" onclick="toggleAuthMode()">LOGIN</b>
            </p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:900; color:var(--neon-pink);">CYBER <span style="color:#fff;">TECH</span></div>
            <div id="u-bal" class="glass" style="padding:5px 15px; color:var(--neon-blue); font-weight:bold;">0 HTG</div>
        </header>

        <div id="p-home" class="page active-page">
            <div class="promo-banner">
                <h3 style="margin:0; color:var(--neon-blue);">🔥 WEEKLY PROMO</h3>
                <p style="font-size:12px; margin:5px 0;">Achte <b>310 Diamonds</b> epi jwenn <b>Bonus</b> pou mwa Avril sa!</p>
            </div>

            <div class="category-grid">
                <div class="service-card" onclick="openStore('FF')">
                    <img src="https://wallpaperaccess.com/full/1855171.jpg">
                    <div class="label">FREE FIRE</div>
                </div>
                <div class="service-card" onclick="openStore('GIFT')">
                    <img src="https://media.direct-apple.com/apple-gift-card-us.jpg">
                    <div class="label">APPLE CARDS</div>
                </div>
                <div class="service-card" onclick="openStore('NETFLIX')">
                    <img src="https://images.ctfassets.net/4cd45et68cgf/4nrtXid7tr8sY9XpS3S68U/563870630737f1e6211833e792c3a502/Netflix-Logo.jpg">
                    <div class="label">NETFLIX</div>
                </div>
            </div>
        </div>

        <div id="p-wallet" class="page">
            <div style="text-align:center; padding:30px;">
                <h1 id="big-bal" style="font-size:45px; text-shadow: 0 0 10px var(--neon-blue);">0.00 HTG</h1>
            </div>
            <div class="glass" style="margin:15px; padding:20px;">
                <h3 style="color:var(--neon-blue);">DEPO NATCASH</h3>
                <p style="font-size:12px;">Nimewo: <b>509 5511-2990</b> (Enelson Pierre)</p>
                <input type="number" id="t-code" placeholder="Transcode (12-15 chif)">
                <input type="number" id="t-amt" placeholder="Montan">
                <button class="cyber-btn" onclick="sendSupport('RECHARGE')">VERIFYE PEMAN</button>
            </div>
        </div>

        <div id="p-history" class="page">
            <h3 style="margin:20px;">TRANZAKSYON YO</h3>
            <div id="hist-list" style="padding:0 15px;"></div>
        </div>

        <nav class="glass">
            <div class="nav-item active" onclick="nav('p-home', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="nav('p-wallet', this)"><i class="fa-solid fa-wallet"></i></div>
            <div class="nav-item" onclick="nav('p-history', this)"><i class="fa-solid fa-clock-rotate-left"></i></div>
        </nav>
    </div>

    <div id="store-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="modal-title">STORE</h2>
            <i class="fa-solid fa-xmark" style="font-size:30px;" onclick="closeStore()"></i>
        </div>
        <div id="ff-input-box" style="display:none; margin-bottom:20px;">
            <input type="number" id="player-id" placeholder="ID PLAYER">
        </div>
        <div id="price-list"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('ft_v14_db')) || { users: {} };
        let user = null;
        let isLoginMode = false;

        const prices = {
            FF: [{v:100, p:165}, {v:310, p:510}, {v:520, p:850}, {v:1060, p:1750}],
            GIFT: [{v:2, p:330}, {v:5, p:825}, {v:10, p:1650}, {v:20, p:3300}, {v:50, p:8250}],
            NETFLIX: [{v:"Premium", p:500}]
        };

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "LOGIN SOU KONT OU" : "KREYE YON KONT";
            document.getElementById('main-auth-btn').innerText = isLoginMode ? "KONEKTE" : "KREYE KONT";
            document.getElementById('auth-switch-text').innerText = isLoginMode ? "Ou pa gen kont?" : "Ou gen kont deja?";
            document.getElementById('auth-toggle').innerText = isLoginMode ? "INSCRIPTION" : "LOGIN";
        }

        function processAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email.includes('@')) return alert("Email la pa bon!");

            if(!isLoginMode) {
                if(db.users[email]) return alert("Email sa gen kont deja!");
                db.users[email] = { email, pass, balance: 0, history: [] };
            } else {
                if(!db.users[email] || db.users[email].pass !== pass) return alert("Email oswa Modpas enkòrèk!");
            }
            
            user = db.users[email];
            save();
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            updateUI();
        }

        function openStore(cat) {
            document.getElementById('modal-title').innerText = cat;
            document.getElementById('ff-input-box').style.display = (cat === 'FF') ? 'block' : 'none';
            const list = document.getElementById('price-list');
            list.innerHTML = prices[cat].map(item => `
                <div class="glass" style="padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${item.v} ${cat==='FF'?'💎':'$'}</b><br><small>${item.p} HTG</small></div>
                    <button class="cyber-btn" style="width:100px; padding:10px;" onclick="buy('${cat}', '${item.v}', ${item.p})">ACHTE</button>
                </div>
            `).join('');
            document.getElementById('store-modal').style.display = 'flex';
        }

        function closeStore() { document.getElementById('store-modal').style.display = 'none'; }

        function buy(type, val, price) {
            const pid = document.getElementById('player-id').value;
            if(type === 'FF' && !pid) return alert("Mete ID a!");
            
            if(user.balance < price) {
                const msg = `Mwen ta renmen achte ${val} ${type} men balans mwen pa ase. Kouman poum recharge kont mwen? \nEmail: ${user.email}`;
                if(confirm("Balans ou pa ase! Èske ou vle kontakte support la pou rechaje?")) {
                    window.location.href = `https://wa.me/50941951159?text=${encodeURIComponent(msg)}`;
                }
                return;
            }

            user.balance -= price;
            const code = generateEliteCode();
            user.history.unshift({ date: new Date().toLocaleString(), desc: `${val} ${type} ${pid?'(ID:'+pid+')':''}`, amt: -price, pin: code });
            save();
            updateUI();
            closeStore();
            alert("✅ Acha Reyisi!");
        }

        function sendSupport(type) {
            const code = document.getElementById('t-code').value;
            const amt = document.getElementById('t-amt').value;
            const now = new Date();
            const dateStr = now.toLocaleDateString();
            const timeStr = now.toLocaleTimeString();

            const msg = `⚡ *DEMANDE DE RECHARGE*\n\n📧 *Email:* ${user.email}\n🛠 *Service:* Natcash Deposit\n💰 *Montant:* ${amt} HTG\n🔢 *Transcode:* ${code}\n📅 *Date:* ${dateStr}\n⏰ *Heure:* ${timeStr}\n\n_Mèsi paske ou chwazi Fake YT Tech!_`;
            window.location.href = `https://wa.me/50941951159?text=${encodeURIComponent(msg)}`;
        }

        function generateEliteCode() {
            const s = () => Math.floor((1 + Math.random()) * 0x10000).toString(16).toUpperCase().substring(1);
            return `${s()}${s()}-${s()}-${s()}-${s()}-${s()}${s()}${s()}`;
        }

        function updateUI() {
            document.getElementById('u-bal').innerText = user.balance.toFixed(0) + " HTG";
            document.getElementById('big-bal').innerText = user.balance.toFixed(2) + " HTG";
            const hist = document.getElementById('hist-list');
            hist.innerHTML = user.history.map(h => `
                <div class="glass" style="padding:15px; margin-bottom:10px; border-left:4px solid var(--neon-blue);">
                    <small style="opacity:0.5">${h.date}</small><br><b>${h.desc}</b><br>
                    <code style="color:var(--neon-blue); font-size:11px;">PIN: ${h.pin}</code>
                </div>
            `).join('');
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function save() { localStorage.setItem('ft_v14_db', JSON.stringify(db)); }
    </script>
</body>
</html>
