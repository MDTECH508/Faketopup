            <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake YT Tech | V16 Ghost</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff003c;
            --neon-blue: #00d4ff;
            --bg-dark: #02050a;
            --glass: rgba(255, 255, 255, 0.03);
            --shimmer: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg-dark);
            background-image: url('https://6ec794d163623879956ebac39f2475e9.jpg'); /* Imaj Central */
            background-attachment: fixed;
            background-size: cover;
            color: #fff; font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- SKELETON & SHIMMER --- */
        .skeleton { position: relative; overflow: hidden; background: #111; border-radius: 20px; }
        .skeleton::after {
            content: ""; position: absolute; inset: 0;
            background: var(--shimmer);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        /* --- GLOW BLOOM EFFECT --- */
        .glow-bloom {
            box-shadow: 0 0 15px var(--neon-pink), 0 0 30px rgba(255, 0, 60, 0.2);
            transition: 0.3s;
        }
        .glow-bloom:hover { box-shadow: 0 0 25px var(--neon-pink), 0 0 50px rgba(255, 0, 60, 0.4); }

        /* --- AUTH --- */
        .auth-overlay { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: flex; justify-content: center; align-items: center; }
        .auth-card { width: 85%; max-width: 380px; padding: 40px 25px; border-radius: 30px; border: 1px solid rgba(0,212,255,0.2); text-align: center; }

        /* --- SERVICE CARDS --- */
        .service-card {
            height: 140px; margin: 15px; border-radius: 25px; position: relative;
            overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        .service-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; opacity: 0.7; }
        .service-card:hover img { transform: scale(1.1); opacity: 1; }
        .service-card h3 { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; margin: 0; background: rgba(0,0,0,0.3); font-size: 22px; font-weight: 900; }

        /* --- UI --- */
        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .input-box { width: 100%; padding: 18px; margin: 10px 0; border-radius: 15px; background: rgba(0,0,0,0.7); border: 1px solid var(--neon-blue); color: #fff; outline: none; }
        .cyber-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--neon-pink); color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; height: 70px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .nav-item { color: #666; font-size: 24px; }
        .nav-item.active { color: var(--neon-blue); filter: drop-shadow(0 0 8px var(--neon-blue)); }

        #admin-panel { position: fixed; inset: 0; background: #000; z-index: 11000; display: none; padding: 25px; overflow-y: auto; }
        .page { display: none; animation: fadeIn 0.4s ease; padding-bottom: 110px; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <h1 id="logo-admin-trigger" style="color:var(--neon-blue); letter-spacing:8px; margin:0; cursor:pointer;" ondblclick="openAdminPortal()">FAKE YT</h1>
            <p style="font-size:10px; opacity:0.5; margin-bottom:30px;">SECURE TOP-UP SYSTEM</p>
            
            <input type="email" id="auth-email" class="input-box" placeholder="Email (Gmail)">
            <input type="password" id="auth-pass" class="input-box" placeholder="Modpas">
            
            <button class="cyber-btn glow-bloom" onclick="handleAuth()">LOGIN / JOIN</button>
            <p style="font-size:11px; margin-top:20px; opacity:0.6;">Sistèm nan ap rekonèt imel ou otomatikman.</p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div style="font-weight:900; font-size:20px; color:var(--neon-pink);">FAKE YT <span style="color:#fff;">TECH</span></div>
            <div id="u-bal" style="background:var(--neon-blue); color:#000; padding:5px 15px; border-radius:20px; font-weight:bold; font-size:14px;">0 HTG</div>
        </header>

        <div id="skeleton-loader" style="padding: 15px;">
            <div class="skeleton" style="height: 120px; margin-bottom: 15px;"></div>
            <div class="skeleton" style="height: 140px; margin-bottom: 15px;"></div>
            <div class="skeleton" style="height: 140px; margin-bottom: 15px;"></div>
        </div>

        <div id="app-content" style="display:none;">
            <div id="p-home" class="page active-page">
                <div class="service-card" onclick="openStore('FF')">
                    <img src="https://e8e9e64656c33f2d5ab73935fb92dceb.jpg">
                    <h3>FREE FIRE</h3>
                </div>
                <div class="service-card" onclick="openStore('GIFT')">
                    <img src="https://8be93e0e1449fc808c712c30feba2202.jpg">
                    <h3>GIFT CARDS</h3>
                </div>
                <div class="service-card" onclick="openStore('NETFLIX')">
                    <img src="https://d80946d649927ca4a96d2dfbb2a66671.jpg">
                    <h3>NETFLIX</h3>
                </div>
            </div>

            <div id="p-wallet" class="page">
                <div style="text-align:center; padding:40px;">
                    <small style="opacity:0.5;">SOLDE TOTAL</small>
                    <h1 id="big-bal" style="font-size:50px; margin:0; color:var(--neon-blue);">0.00 HTG</h1>
                </div>
                <div style="margin:20px; padding:25px; border-radius:30px; background:rgba(255,255,255,0.05); border:1px dashed var(--neon-blue);">
                    <p>Natcash: <b>5511-2990</b> (Enelson Pierre)</p>
                    <input type="number" id="t-code" class="input-box" placeholder="Transcode">
                    <input type="number" id="t-amt" class="input-box" placeholder="Montant">
                    <button class="cyber-btn glow-bloom" onclick="contactSupport()">RECHARGE KONT</button>
                </div>
            </div>

            <div id="p-history" class="page">
                <h3 style="margin:20px;">ISTORIK</h3>
                <div id="hist-list" style="padding:0 20px;"></div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="nav('p-home', this)"><i class="fa-solid fa-ghost"></i></div>
            <div class="nav-item" onclick="nav('p-wallet', this)"><i class="fa-solid fa-wallet"></i></div>
            <div class="nav-item" onclick="nav('p-history', this)"><i class="fa-solid fa-clock-rotate-left"></i></div>
        </nav>
    </div>

    <div id="admin-panel">
        <h2 style="color:var(--neon-pink);">SYSTEM OVERRIDE</h2>
        <div style="padding:20px; border-radius:20px; background:rgba(255,255,255,0.05);">
            <input type="email" id="adm-email" class="input-box" placeholder="Email Kliyan">
            <input type="number" id="adm-amt" class="input-box" placeholder="Montant">
            <button class="cyber-btn" style="background:#00ff88; color:#000;" onclick="adminAdd()">VALIDER RECHAJ</button>
        </div>
        <button class="cyber-btn" style="margin-top:20px; background:#333;" onclick="document.getElementById('admin-panel').style.display='none'">EXIT</button>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('ft_v16_db')) || { users: {} };
        let user = null;

        function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email.includes('@')) return alert("Email invalid!");

            if(!db.users[email]) {
                db.users[email] = { email, pass, balance: 0, history: [] };
            }
            user = db.users[email];
            save();
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            // Simile Skeleton Loader
            setTimeout(() => {
                document.getElementById('skeleton-loader').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                updateUI();
            }, 1800);
        }

        function updateUI() {
            document.getElementById('u-bal').innerText = user.balance.toFixed(0) + " HTG";
            document.getElementById('big-bal').innerText = user.balance.toFixed(2) + " HTG";
            document.getElementById('hist-list').innerHTML = user.history.map(h => `
                <div style="padding:15px; background:rgba(255,255,255,0.05); border-radius:15px; margin-bottom:10px; border-left:3px solid var(--neon-blue);">
                    <small style="opacity:0.4">${h.date}</small><br><b>${h.desc}</b><br>
                    <code style="color:var(--neon-blue)">${h.pin}</code>
                </div>
            `).join('');
        }

        function openAdminPortal() {
            if(prompt("ACCESS CODE:") === "1234") {
                document.getElementById('admin-panel').style.display = 'block';
            }
        }

        function adminAdd() {
            const email = document.getElementById('adm-email').value;
            const amt = parseFloat(document.getElementById('adm-amt').value);
            if(db.users[email]) {
                db.users[email].balance += amt;
                save();
                alert("DONE!");
                if(user.email === email) updateUI();
            } else { alert("User not found!"); }
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function contactSupport() {
            const c = document.getElementById('t-code').value;
            const a = document.getElementById('t-amt').value;
            const msg = `⚡ *RECHARGE V16*\nUser: ${user.email}\nAmt: ${a} HTG\nCode: ${c}\nTime: ${new Date().toLocaleString()}`;
            window.location.href = `https://wa.me/50941951159?text=${encodeURIComponent(msg)}`;
        }

        function save() { localStorage.setItem('ft_v16_db', JSON.stringify(db)); }
        
        // Soti nan store la (pou simplifie, mwen pa mete tout kòd store la pou espas, men li mache menm jan ak v15)
        function openStore(cat) { alert("Sistèm Store " + cat + " ap chaje..."); }
    </script>
</body>
</html>
