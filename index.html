                   <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Tech Premium - V3 Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff003c;
            --glass: rgba(255, 255, 255, 0.03);
            --deep-glass: rgba(0, 0, 0, 0.85);
            --border: 1px solid rgba(255, 255, 255, 0.12);
            --neon: 0 0 15px rgba(255, 0, 60, 0.5);
        }

        body, html {
            margin: 0; padding: 0; background: #050505;
            color: #fff; font-family: 'Poppins', sans-serif;
            min-height: 100vh; overflow-x: hidden;
        }

        .bg-vibe {
            position: fixed; inset: 0;
            background: url('https://i.pinimg.com/originals/eb/3a/7b/eb3a7b6d1947e44a49186675003666f2.jpg') center/cover;
            filter: brightness(0.2) blur(5px); z-index: -2;
        }

        /* LOGIN & ADMIN SCREENS */
        .full-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(25px); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }

        .glass-box {
            background: var(--glass); border: var(--border);
            padding: 30px; border-radius: 30px; width: 85%; max-width: 380px; text-align: center;
        }

        .auth-input {
            width: 100%; padding: 14px; margin-top: 12px; border-radius: 12px;
            border: var(--border); background: rgba(0,0,0,0.6); color: #fff; outline: none; box-sizing: border-box;
        }

        .btn-glow {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: linear-gradient(45deg, var(--primary-red), #b3002a);
            color: #fff; font-weight: 700; margin-top: 15px; cursor: pointer; box-shadow: var(--neon);
        }

        /* MODAL */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px); z-index: 20000;
            display: none; justify-content: center; align-items: center;
        }

        /* DASHBOARD */
        header { padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: var(--border); background: var(--deep-glass); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card-item { background: var(--glass); border: var(--border); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; backdrop-filter: blur(10px); }
        .page { display: none; padding-bottom: 120px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(10,10,10,0.85); backdrop-filter: blur(20px); border-radius: 30px; display: flex; justify-content: space-around; padding: 15px 0; border: var(--border); }
        .nav-item { color: rgba(255,255,255,0.3); font-size: 20px; cursor: pointer; }
        .nav-item.active { color: var(--primary-red); text-shadow: var(--neon); }
    </style>
</head>
<body>

    <div class="bg-vibe"></div>

    <div id="modal-overlay">
        <div class="glass-box">
            <h2 id="modal-title" style="color:var(--primary-red); margin-top:0;"></h2>
            <div id="modal-body"></div>
            <button class="btn-glow" style="background:#222; box-shadow:none; margin-top:20px;" onclick="closeModal()">FÈMEN</button>
        </div>
    </div>

    <div id="auth-screen" class="full-screen">
        <div class="glass-box">
            <h1 id="auth-header">KONEKTE</h1>
            <input type="text" id="user-input" class="auth-input" placeholder="Non konplè">
            <input type="number" id="whatsapp-input" class="auth-input" placeholder="Nimewo WhatsApp">
            <input type="password" id="pass-input" class="auth-input" placeholder="PIN (4 chif)">
            <button class="btn-glow" onclick="handleAuth()">KONFIME</button>
            <p style="font-size:12px; margin-top:15px; opacity:0.6;" onclick="toggleAuth()" id="auth-toggle">Pa gen kont? <b>Kreye yonn</b></p>
            <p style="font-size:10px; margin-top:20px; color:var(--primary-red)" onclick="openAdminLogin()">Accès Admin</p>
        </div>
    </div>

    <div id="admin-panel" class="full-screen" style="display:none; overflow-y:auto;">
        <div class="glass-box" style="max-width:600px; width:95%;">
            <h2 style="color:var(--primary-red)">ADMIN PANEL ⚙️</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                <div class="card-item">Total Users<br><b id="adm-users">1</b></div>
                <div class="card-item">Total Sales<br><b id="adm-sales">0.00</b></div>
            </div>
            <div id="user-list" style="text-align:left; font-size:12px; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px;">
                </div>
            <button class="btn-glow" onclick="closeAdmin()">KITE ADMIN</button>
        </div>
    </div>

    <div id="app-content" style="display:none">
        <header>
            <div style="font-weight:900;">F-T <span style="color:var(--primary-red)">PREMIUM</span></div>
            <div id="client-id" style="font-size:10px; padding:6px 15px; background:rgba(255,0,60,0.15); border-radius:20px; border:1px solid var(--primary-red);">ID: 0000</div>
        </header>

        <div id="home" class="page active">
            <div class="grid-container">
                <div class="card-item" onclick="openFF()"><i class="fa-solid fa-gem" style="color:var(--primary-red)"></i><br>Free Fire</div>
                <div class="card-item" onclick="openNetflix()"><i class="fa-solid fa-tv"></i><br>Netflix</div>
                <div class="card-item" onclick="openTikTok()"><i class="fa-brands fa-tiktok"></i><br>TikTok Coins</div>
                <div class="card-item" onclick="comingSoon('Apple Gift Card')"><i class="fa-brands fa-apple"></i><br>Apple Gift</div>
                <div class="card-item" onclick="comingSoon('Roblox')"><i class="fa-solid fa-cube"></i><br>Roblox</div>
                <div class="card-item" onclick="comingSoon('BloodStrike')"><i class="fa-solid fa-gun"></i><br>BloodStrike</div>
            </div>
        </div>

        <div id="recharge" class="page">
            <div class="card-item" style="margin:20px; background:rgba(255,0,60,0.1);">
                <small>BALANCE RECHARGE</small>
                <h1 id="user-balance">0.00 HTG</h1>
            </div>
            <div style="padding:20px;">
                <h3>DEPÔT NATCASH</h3>
                <p style="font-size:13px; opacity:0.8;">Transfert kob la sou: <b>5511-2990</b></p>
                <input type="number" id="dep-trans" class="auth-input" placeholder="Transcode (12-15 chif)">
                <input type="number" id="dep-amount" class="auth-input" placeholder="Kantite kòb ou voye">
                <button class="btn-glow" onclick="submitDeposit()">VOYE POU VALIDASYON</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showPage('home', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="showPage('recharge', this)"><i class="fa-solid fa-wallet"></i></div>
            <div class="nav-item" onclick="showPage('profile', this)"><i class="fa-solid fa-user-gear"></i></div>
        </nav>
    </div>

    <script>
        let isLoginMode = true;
        let currentUser = null;
        let adminBalance = 1000;

        // AUTH SYSTEM
        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-header').innerText = isLoginMode ? "KONEKTE" : "KREYE KONT";
            document.getElementById('auth-toggle').innerHTML = isLoginMode ? "Pa gen kont? <b>Kreye yonn</b>" : "Ou gen kont? <b>Konekte</b>";
        }

        function handleAuth() {
            const name = document.getElementById('user-input').value;
            const phone = document.getElementById('whatsapp-input').value;
            const pin = document.getElementById('pass-input').value;

            if(name && phone && pin.length === 4) {
                currentUser = { name, phone, pin, balance: 0, id: "FT-"+Math.floor(1000+Math.random()*9000) };
                localStorage.setItem('active_user', JSON.stringify(currentUser));
                startApp();
            } else { alert("Remplir tout fòm yo pwop!"); }
        }

        function startApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            const user = JSON.parse(localStorage.getItem('active_user'));
            document.getElementById('client-id').innerText = "ID: " + user.id;
            document.getElementById('user-balance').innerText = user.balance.toFixed(2) + " HTG";
        }

        // DEPOSIT SYSTEM
        function submitDeposit() {
            const trans = document.getElementById('dep-trans').value;
            const amt = document.getElementById('dep-amount').value;
            
            if(trans.length >= 12 && trans.length <= 15 && amt > 0) {
                const now = new Date();
                const msg = `✅ Reçu! Sistèm nan ap verifie.\nDate: ${now.toLocaleDateString()}\nHeure: ${now.toLocaleTimeString()}\nTranscode: ${trans}\nMontant: ${amt} HTG`;
                alert(msg);
                // Simulation update balance
                window.location.href = `https://wa.me/50955112990?text=${encodeURIComponent("Validation Depot: "+trans+" Amt: "+amt)}`;
            } else { alert("Transcode dwe 12-15 chif!"); }
        }

        // FREE FIRE REDEEMPINS
        function openFF() {
            const modal = document.getElementById('modal-overlay');
            document.getElementById('modal-title').innerText = "TOPUP FREE FIRE";
            document.getElementById('modal-body').innerHTML = `
                <input type="number" id="ff-id" class="auth-input" placeholder="Antre ID Player">
                <button class="btn-glow" onclick="verifyGarena()">VÉRIFIÉ SUR GARENA</button>
                <div id="player-name" style="margin:10px; color:#00ffcc; font-weight:bold;"></div>
                <div id="ff-options" style="display:none">
                    <p style="font-size:12px;">Chwazi Diamonds pou RedeeemPins.com</p>
                    <button class="btn-glow" style="background:#333;" onclick="getFFCode(100, 165)">100💎 - 165 HTG</button>
                    <button class="btn-glow" style="background:#333;" onclick="getFFCode(310, 450)">310💎 - 450 HTG</button>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function verifyGarena() {
            const id = document.getElementById('ff-id').value;
            if(id.length > 5) {
                document.getElementById('player-name').innerText = "✅ Player: " + id + "_GarenaUser";
                document.getElementById('ff-options').style.display = 'block';
            }
        }

        function getFFCode(dm, price) {
            const code = "PIN-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            alert(`KÒD OU: ${code}\n\nKopié l epi al antre l nan redeempins.com kounye a!`);
            window.location.href = "https://redeempins.com";
        }

        // NETFLIX WHATSAPP
        function openNetflix() {
            const user = JSON.parse(localStorage.getItem('active_user'));
            const msg = `Bonjour, j'ai effectué un paiement pour un abonnement Netflix mensuel.\nNom: ${user.name}\nID: ${user.id}\nInfo: Veuillez valider mon profil et envoyer mon mot de passe + code profil.`;
            window.location.href = `https://wa.me/50955112990?text=${encodeURIComponent(msg)}`;
        }

        // TIKTOK
        function openTikTok() {
            const user = JSON.parse(localStorage.getItem('active_user'));
            const msg = `Bonjour, je souhaite recharger mon compte TikTok via mon balance de recharge.\nNom: ${user.name}\nID: ${user.id}`;
            window.location.href = `https://wa.me/50955112990?text=${encodeURIComponent(msg)}`;
        }

        // SERVICES NON DISPONIBLES
        function comingSoon(service) {
            const user = JSON.parse(localStorage.getItem('active_user'));
            const msg = `Service: ${service}\nNom: ${user.name}\nID: ${user.id}\nMessage: Mwen bezwen sèvis sa ki poko disponib la.`;
            window.location.href = `https://wa.me/50955112990?text=${encodeURIComponent(msg)}`;
        }

        // ADMIN SYSTEM
        function openAdminLogin() {
            const pin = prompt("Antre kòd Admin nan:");
            if(pin === "1234") {
                document.getElementById('admin-panel').style.display = 'flex';
                loadAdminData();
            } else { alert("Kòd Erone!"); }
        }

        function loadAdminData() {
            const user = JSON.parse(localStorage.getItem('active_user'));
            document.getElementById('adm-users').innerText = "1 (Vwa)";
            document.getElementById('adm-sales').innerText = "0.00 HTG";
            document.getElementById('user-list').innerHTML = `
                <div style="border-bottom:1px solid #333; padding:5px;">
                    <b>${user.name}</b> - ${user.phone}<br>
                    ID: ${user.id} | Bal: ${user.balance} | PIN: ${user.pin}
                </div>
            `;
        }

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        window.onload = () => {
            if(localStorage.getItem('active_user')) startApp();
        };
    </script>
</body>
</html>
