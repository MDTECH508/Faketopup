           <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Topup - Pro Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #05070a;
            --card-gray: rgba(26, 28, 35, 0.9);
            --accent-blue: #00e5ff;
            --ff-orange: #ff9d00;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            /* Sèvi ak imaj teksti nwa/gri a kòm background */
            background: linear-gradient(rgba(5, 7, 10, 0.8), rgba(5, 7, 10, 0.8)), 
                        url('https://i.pinimg.com/originals/eb/3a/7b/eb3a7b6d1947e44a49186675003666f2.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- HEADER --- */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 14, 20, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-diamond {
            width: 35px; height: 35px;
            background: linear-gradient(135deg, #ff0055, #7000ff);
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }
        .logo-text { font-weight: 800; font-size: 18px; letter-spacing: 1px; }
        .logo-text span { color: #ff0055; font-size: 10px; display: block; margin-top: -5px; }

        /* --- NAVIGATION --- */
        .page { display: none; padding: 20px 15px 100px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- BANNER (Sèvi ak imaj machin yo) --- */
        .hero-slider {
            width: 100%;
            height: 180px;
            border-radius: 20px;
            background: url('https://images.wallpapersden.com/wallpaper/d/lamborghini-huracan-gt3-evo_65874.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            padding: 20px;
            box-sizing: border-box;
        }
        .hero-text { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; backdrop-filter: blur(5px); }

        /* --- GRID PRODUITS --- */
        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .product-card {
            background: var(--card-gray);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
            transition: 0.3s;
        }
        .product-img { width: 100%; height: 130px; object-fit: cover; }
        .ff-img { content: url('https://i.pinimg.com/originals/6a/82/3e/6a823e8006e88536f903080e70415394.jpg'); } /* Imaj Free Fire ou a */
        
        .product-info { padding: 12px; }
        .product-name { font-weight: 600; font-size: 14px; display: block; }
        .product-price { color: var(--accent-blue); font-weight: 800; font-size: 13px; }

        /* --- WALLET (Style Dizi) --- */
        .wallet-box {
            background: linear-gradient(135deg, #161c23 0%, #0b0e14 100%);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid var(--border);
            text-align: center;
            margin-bottom: 20px;
        }
        .wallet-balance { font-size: 32px; font-weight: 800; color: #ffcc00; margin: 10px 0; }
        .btn-action {
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            border: none; padding: 15px; width: 100%; border-radius: 12px;
            color: white; font-weight: bold; margin-bottom: 10px; cursor: pointer;
        }

        /* --- NAVBAR --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(11, 14, 20, 0.95);
            display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .nav-item { text-align: center; color: #555; font-size: 10px; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 5px; }

    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-diamond"></div>
            <div class="logo-text">FAKE TOPUP <span>SERVICE RAPIDE</span></div>
        </div>
        <div style="display:flex; gap:15px; font-size:18px; color:#888;">
            <i class="fa-solid fa-sun"></i>
            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-gear"></i>
        </div>
    </header>

    <div id="home" class="page active">
        <div class="hero-slider">
            <div class="hero-text">
                <small>PROMOTION FLASH</small>
                <div style="font-weight:bold; color:var(--accent-blue);">Gade film ak serie</div>
            </div>
        </div>

        <div class="section-title">
            Produits Disponibles <span style="color:var(--accent-blue); font-size:12px;">Voir plus +2</span>
        </div>

        <div class="grid-container">
            <div class="product-card" onclick="alert('110 Diamonds - 165 HTG')">
                <img class="product-img ff-img">
                <div class="product-info">
                    <span class="product-name">Free Fire</span>
                    <span class="product-price">165 HTG</span>
                </div>
            </div>
            <div class="product-card">
                <img src="https://images.ctfassets.net/4cd45et68cgf/4nBn7nSpS0fCfs9BRiC6MM/8520745a3323c4c048c054e65ec90061/Netflix-Logo.jpg" class="product-img">
                <div class="product-info">
                    <span class="product-name">Netflix</span>
                    <span class="product-price">330 HTG</span>
                </div>
            </div>
            <div class="product-card">
                <img src="https://i.pinimg.com/736x/8a/8d/2c/8a8d2c49983991f24d77598687752e5c.jpg" class="product-img">
                <div class="product-info">
                    <span class="product-name">Accès Premium</span>
                    <span class="product-price">500 HTG</span>
                </div>
            </div>
            <div class="product-card">
                <img src="https://p16-va.lemon8cdn.com/obj/tos-alisg-v-a3e477-sg/o0A6AnEIAfIeC6QAeIAEABAf0vA8Q9ADIE0AFA" class="product-img">
                <div class="product-info">
                    <span class="product-name">TikTok Coins</span>
                    <span class="product-price">120 HTG</span>
                </div>
            </div>
        </div>
    </div>

    <div id="wallet" class="page">
        <div class="wallet-box">
            <small style="opacity:0.6;">Mon portefeuille FAKE</small>
            <div class="wallet-balance">HTG 175,00</div>
            <button class="btn-action"><i class="fa-solid fa-plus"></i> Ajouter de l'argent</button>
            <button class="btn-action" style="background:rgba(255,255,255,0.05); border:1px solid var(--border);">
                <i class="fa-solid fa-paper-plane"></i> Envoyer de l'argent
            </button>
        </div>

        <div class="section-title">Transactions</div>
        <div style="background:var(--card-gray); border-radius:15px; padding:15px; border:1px solid var(--border); display:flex; justify-content:space-between;">
            <div>
                <b style="display:block; font-size:14px;">PIN GIFT 2 $</b>
                <small style="color:#666;">29 avr. 2026</small>
            </div>
            <span style="color:#ff4444; font-weight:bold;">-330.00</span>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navTo('home', this)">
            <i class="fa-solid fa-house"></i>Accueil
        </div>
        <div class="nav-item" onclick="navTo('home', this)">
            <i class="fa-solid fa-cart-shopping"></i>Boutique
        </div>
        <div class="nav-item" onclick="navTo('home', this)">
            <i class="fa-solid fa-key"></i>Mes accès
        </div>
        <div class="nav-item" onclick="navTo('wallet', this)">
            <i class="fa-solid fa-wallet"></i>Wallet
        </div>
    </nav>

    <script>
        function navTo(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
