<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake YT Tech | V13 Ultra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff003c;
            --accent: #00d4ff;
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: #fff; font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* LOGIN SCREEN */
        .auth-container {
            position: fixed; inset: 0; 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://img.vavel.com/free-fire-1590426176315.jpg') center/cover;
            z-index: 10000; display: flex; justify-content: center; align-items: center;
        }
        .auth-card {
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px);
            padding: 40px 30px; border-radius: 30px; border: 2px solid var(--primary);
            width: 85%; max-width: 400px; text-align: center;
        }

        /* TEMPLATES STYLE */
        .template-card {
            height: 180px; margin: 15px; border-radius: 20px;
            position: relative; overflow: hidden; display: flex;
            align-items: flex-end; padding: 20px; cursor: pointer;
            transition: 0.3s; border: var(--border);
        }
        .template-card:active { transform: scale(0.96); }
        .template-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.6; }
        .template-card h3 { position: relative; z-index: 2; margin: 0; font-size: 24px; text-shadow: 2px 2px 10px #000; }

        /* MODAL PRIX */
        .modal-prix {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 500; display: none; flex-direction: column; padding: 20px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .price-item {
            background: var(--glass); padding: 20px; border-radius: 15px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; border: var(--border);
        }
        .price-btn { background: var(--primary); border: none; color: #fff; padding: 10px 20px; border-radius: 10px; font-weight: bold; }

        /* ADMIN */
        .admin-modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; padding: 20px; overflow-y: auto; }

        /* UTILS */
        .input-box { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: var(--border); background: #111; color: #fff; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; margin-top: 15px; }
        nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: var(--border); z-index: 100; }
        .nav-btn { color: #666; font-size: 20px; cursor: pointer; }
        .nav-btn.active { color: var(--primary); }
        .page { display: none; padding-bottom: 100px; }
        .active-page { display: block; }
    </style>
</head>
<body>

    <div id="login-screen" class="auth-container">
        <div class="auth-card">
            <h1 style="color:var(--primary); margin:0;">FAKE YT</h1>
            <p style="font-size:12px; opacity:0.6; margin-bottom:20px;">TOP-UP OFFICIAL</p>
            <input type="email" id="u-email" class="input-box" placeholder="Email (Gmail)">
            <input type="password" id="u-pass" class="input-box" placeholder="Modpas">
            <button class="btn-action" onclick="login()">KONEKTE</button>
            <p onclick="openAdmin()" style="margin-top:20px; font-size:10px; opacity:0.5;">ADMIN LOGIN</p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header style="padding:20px; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.8);">
            <div style="font-weight:900;">FAKE YT <span style="color:var(--primary)">TECH</span></div>
            <div id="top-balance" style="color:var(--accent); font-weight:bold; border:1px solid var(--accent); padding:5px 12px; border-radius:15px;">0 HTG</div>
        </header>

        <div id="home-page" class="page active-page">
            <div class="template-card" onclick="openPrices('FF')">
                <img src="https://freefiremobile-a.akamaihd.net/ffadmin/240/1f726710777e4093952f9c313134e756.jpg">
                <h3>GARENA FREE FIRE</h3>
            </div>

            <div class="template-card" onclick="openPrices('GIFT')">
                <img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/AMZ_Apple_Gift_Card_Consumer_1box_Card_Front_Vertical?wid=1000&hei=1000&fmt=jpeg&qlt=95&.v=1626292524000">
                <h3>APPLE GIFT CARDS</h3>
            </div>

            <div class="template-card" onclick="openPrices('NETFLIX')">
                <img src="https://images.ctfassets.net/4cd45et68cgf/4nrtXid7tr8sY9XpS3S68U/563870630737f1e6211833e792c3a502/Netflix-Logo.jpg">
                <h3>NETFLIX PREMIUM</h3>
            </div>
        </div>

        <div id="modal-prix" class="modal-prix">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 id="modal-title">LIST PRIX</h2>
                <i class="fa-solid fa-xmark" style="font-size:30px;" onclick="closePrices()"></i>
            </div>
            <div id="player-id-section" style="display:none; margin-bottom:20px;">
                <input type="number" id="ff-id" class="input-box" placeholder="Antre ID Player la">
            </div>
            <div id="price-list-container"></div>
        </div>

        <div id="wallet-page" class="page">
            <div style="text-align:center; padding:40px 20px;">
                <h1 id="wallet-total" style="font-size:50px; color:var(--accent);">0.00 HTG</h1>
            </div>
            <div class="glass-card" style="margin:15px; padding:20px; border-radius:20px; border:1px dashed var(--accent);">
                <p>Depoze sou: <b>5511-2990</b> (Enelson Pierre)</p>
                <input type="number" id="t-code" class="input-box" placeholder="Transcode">
                <input type="number" id="t-amt" class="input-box" placeholder="Montant HTG">
                <button class="btn-action" onclick="rechargeWA()">VALIDER PEMA</button>
            </div>
        </div>

        <div id="history-page" class="page">
            <h3 style="margin:20px;">HISTORY</h3>
            <div id="hist-list" style="padding:0 15px;"></div>
        </div>

        <nav>
            <div class="nav-btn active" onclick="show('home-page', this)"><i class="fa-solid fa-gem"></i></div>
            <div class="nav-btn" onclick="show('wallet-page', this)"><i class="fa-solid fa-wallet"></i></div>
            <div class="nav-btn" onclick="show('history-page', this)"><i class="fa-solid fa-clock-rotate-left"></i></div>
        </nav>
    </div>

    <div id="admin-panel" class="admin-modal">
        <h2 style="color:var(--primary);">ADMIN DASHBOARD</h2>
        <div class="glass-card">
            <p>RECHARGE PAR EMAIL</p>
            <input type="email" id="adm-email" class="input-box" placeholder="Email Kliyan an">
            <input type="number" id="adm-amt" class="input-box" placeholder="Montant pou ajoute">
            <button class="btn-action" onclick="adminCredit()">RECHARGE KONT LAN</button>
        </div>
        <button class="btn-action" style="background:#222;" onclick="document.getElementById('admin-panel').style.display='none'">FÈMEN</button>
        <div id="admin-logs" style="margin-top:20px; font-size:11px;"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('ft_v13_db')) || { users: {}, logs: [] };
        let user = null;

        const prices = {
            FF: [ {v:100, p:165}, {v:310, p:510}, {v:520, p:850}, {v:1060, p:1750} ],
            GIFT: [ {v:2, p:330}, {v:5, p:825}, {v:10, p:1650}, {v:20, p:3300}, {v:50, p:8250} ],
            NETFLIX: [ {v:"1 Mois", p:500} ]
        };

        function login() {
            const email = document.getElementById('u-email').value;
            const pass = document.getElementById('u-pass').value;
            if(!email.includes('@')) return alert("Email invalid!");
            if(!db.users[email]) db.users[email] = { email, pass, balance: 0, history: [] };
            user = db.users[email];
            save();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            update();
        }

        function openPrices(cat) {
            const container = document.getElementById('price-list-container');
            const title = document.getElementById('modal-title');
            const idSection = document.getElementById('player-id-section');
            
            title.innerText = cat + " OPTIONS";
            idSection.style.display = (cat === 'FF') ? 'block' : 'none';
            container.innerHTML = "";
            
            prices[cat].forEach(item => {
                container.innerHTML += `
                    <div class="price-item">
                        <div><b>${item.v} ${cat === 'FF' ? '💎' : cat === 'GIFT' ? '$' : ''}</b><br><small>${item.p} HTG/GDS</small></div>
                        <button class="price-btn" onclick="buy('${cat}', '${item.v}', ${item.p})">ACHTE</button>
                    </div>
                `;
            });
            document.getElementById('modal-prix').style.display = 'flex';
        }

        function closePrices() { document.getElementById('modal-prix').style.display = 'none'; }

        function buy(type, val, price) {
            const ffId = document.getElementById('ff-id').value;
            if(type === 'FF' && !ffId) return alert("Mete ID Player la!");
            if(user.balance < price) return alert("Balance ou pa ase!");

            user.balance -= price;
            const code = generateCode();
            const entry = { date: new Date().toLocaleString(), desc: `${val} ${type} ${ffId ? '('+ffId+')' : ''}`, amt: -price, pin: code };
            
            user.history.unshift(entry);
            db.logs.unshift({ ...entry, user: user.email });
            save();
            update();
            closePrices();
            alert("Acha reyisi! Kòd ou nan History.");
        }

        function generateCode() {
            const s = () => Math.floor((1 + Math.random()) * 0x10000).toString(16).toUpperCase().substring(1);
            return `${s()}${s()}-${s()}-${s()}-${s()}-${s()}${s()}${s()}`;
        }

        function adminCredit() {
            const email = document.getElementById('adm-email').value;
            const amt = parseFloat(document.getElementById('adm-amt').value);
            if(db.users[email]) {
                db.users[email].balance += amt;
                db.logs.unshift({ date: new Date().toLocaleString(), desc: "ADMIN RECHARGE", amt: amt, user: email });
                save();
                alert("Kòb ajoute!");
                if(user && user.email === email) update();
            } else { alert("Email sa pa nan sistèm nan!"); }
        }

        function update() {
            document.getElementById('top-balance').innerText = user.balance.toFixed(0) + " HTG";
            document.getElementById('wallet-total').innerText = user.balance.toFixed(2) + " HTG";
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('hist-list');
            list.innerHTML = user.history.map(h => `
                <div class="glass-card" style="padding:15px; margin-bottom:10px;">
                    <small>${h.date}</small><br><b>${h.desc}</b><br>
                    <code style="color:var(--accent)">PIN: ${h.pin}</code>
                </div>
            `).join('');
        }

        function openAdmin() { if(prompt("ADMIN PASS:") === "1234") document.getElementById('admin-panel').style.display='block'; }
        function show(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function save() { localStorage.setItem('ft_v13_db', JSON.stringify(db)); }
        function rechargeWA() {
            const c = document.getElementById('t-code').value;
            const a = document.getElementById('t-amt').value;
            window.location.href = `https://wa.me/50941951159?text=RECHARGE%20EMAIL:%20${user.email}%20CODE:%20${c}%20AMT:%20${a}`;
        }
    </script>
</body>
</html>
